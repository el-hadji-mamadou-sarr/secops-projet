apiVersion: apps/v1
kind: Deployment
metadata:
  name: secops-api
  labels:
    app: secops-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secops-api
  template:
    metadata:
      labels:
        app: secops-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: secops-api
          image: secops-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: secops-api
spec:
  selector:
    app: secops-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
